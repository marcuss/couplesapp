name: TypeCheck + Schema Validation

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npm run typecheck

  schema-drift:
    runs-on: ubuntu-latest
    # Only run when Supabase project ID and PAT are available
    if: ${{ vars.SUPABASE_PROJECT_ID != '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Supabase CLI
        run: npm install -g supabase

      - name: Check for schema drift (types out of sync)
        run: npm run gen-types:check
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        # Failure here means: someone changed the DB schema without running gen-types
        # Fix: run `npm run gen-types` locally and commit the updated database.types.ts
