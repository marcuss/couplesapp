name: E2E Nightly

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to test (default: main)'
        required: false
        default: 'main'

jobs:
  e2e:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
    outputs:
      chromium_result: ${{ steps.run-tests.outputs.result }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || 'main' }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright (${{ matrix.browser }})
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: Run E2E tests (${{ matrix.browser }})
        id: run-tests
        run: |
          npx playwright test --project=${{ matrix.browser }} --reporter=html,github
          echo "result=passed" >> $GITHUB_OUTPUT
        continue-on-error: true
        env:
          BASE_URL: ${{ secrets.BASE_URL || 'http://localhost:5173' }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Upload report to S3 (only on failure)
        if: steps.run-tests.outcome == 'failure'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
        run: |
          REPORT_KEY="e2e-reports/$(date +%Y-%m-%d)/${{ matrix.browser }}"
          aws s3 sync playwright-report/ s3://couplesapp-dev-frontend/$REPORT_KEY/ \
            --cache-control "max-age=86400"
          REPORT_URL="https://dlr56cmovhfn0.cloudfront.net/$REPORT_KEY/index.html"
          echo "REPORT_URL=$REPORT_URL" >> $GITHUB_ENV
          echo "report_url=$REPORT_URL" >> $GITHUB_OUTPUT

      - name: Notify via OpenClaw webhook (only on failure)
        if: steps.run-tests.outcome == 'failure'
        run: |
          curl -s -X POST "${{ secrets.OPENCLAW_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"text\": \"❌ *E2E Nightly Failed* — ${{ matrix.browser }}\\n📅 $(date +%Y-%m-%d)\\n🔗 Ver reporte: ${{ env.REPORT_URL }}\\n🔗 GHA Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\"
            }" || true

      - name: Fail job if tests failed
        if: steps.run-tests.outcome == 'failure'
        run: exit 1
