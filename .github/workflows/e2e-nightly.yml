name: E2E Nightly

on:
  # Runs every day at 2 AM COT (7 AM UTC)
  schedule:
    - cron: '0 7 * * *'
  # Also triggerable manually
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to test (default: main)'
        required: false
        default: 'main'

jobs:
  e2e:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || 'main' }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright (${{ matrix.browser }})
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: Create auth state dir
        run: mkdir -p e2e/.auth

      - name: Run E2E tests (${{ matrix.browser }})
        run: npx playwright test --project=${{ matrix.browser }}
        env:
          # URL of the running app (webServer starts it if not set)
          BASE_URL: ${{ secrets.BASE_URL || 'http://localhost:5173' }}
          # Supabase config — needed by both webServer (vite dev) and global-setup
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          # Test user credentials — create this user in Supabase dev once
          E2E_TEST_EMAIL: ${{ secrets.E2E_TEST_EMAIL }}
          E2E_TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}

      - name: Upload report (${{ matrix.browser }})
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: nightly-report-${{ matrix.browser }}
          path: playwright-report/
          retention-days: 14

      - name: Upload report to S3 (${{ matrix.browser }})
        if: always()
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
        run: |
          DATE=$(date -u +%Y-%m-%d)
          aws s3 sync playwright-report/ s3://couplesapp-e2e-reports/${DATE}/${{ matrix.browser }}/ --delete
          echo "Report available at: http://couplesapp-e2e-reports.s3-website-us-east-1.amazonaws.com/${DATE}/${{ matrix.browser }}/index.html"
