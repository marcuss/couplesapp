name: E2E Nightly

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to test (default: main)'
        required: false
        default: 'main'

jobs:
  e2e:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || 'main' }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright (${{ matrix.browser }})
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: Run E2E tests (${{ matrix.browser }})
        id: run-tests
        run: npx playwright test --project=${{ matrix.browser }} --reporter=html,github
        continue-on-error: true
        env:
          BASE_URL: ${{ secrets.BASE_URL || 'http://localhost:5173' }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Upload HTML report (${{ matrix.browser }})
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ matrix.browser }}-${{ github.run_id }}
          path: playwright-report/
          retention-days: 14

      - name: Fail if tests failed
        if: steps.run-tests.outcome == 'failure'
        run: exit 1

  notify-on-failure:
    runs-on: ubuntu-latest
    needs: e2e
    if: failure()
    steps:
      - name: Summary
        run: |
          echo "## ❌ Nightly E2E Failed" >> $GITHUB_STEP_SUMMARY
          echo "Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" >> $GITHUB_STEP_SUMMARY
          echo "Download the HTML report from Artifacts to see details." >> $GITHUB_STEP_SUMMARY
