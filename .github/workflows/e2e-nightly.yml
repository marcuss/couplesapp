name: E2E Nightly

on:
  schedule:
    - cron: '0 7 * * *'   # 7 AM UTC = 2 AM COT
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to test (default: main)'
        required: false
        default: 'main'

jobs:
  e2e:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || 'main' }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright (${{ matrix.browser }})
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: Run E2E tests (${{ matrix.browser }})
        id: run-tests
        run: npx playwright test --project=${{ matrix.browser }} --reporter=html,github
        continue-on-error: true
        env:
          BASE_URL: ${{ secrets.BASE_URL || 'http://localhost:5173' }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Upload report to S3 (on failure)
        if: steps.run-tests.outcome == 'failure'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
        run: |
          DATE=$(date +%Y-%m-%d)
          REPORT_PATH="${DATE}/${{ matrix.browser }}"
          aws s3 sync playwright-report/ \
            s3://couplesapp-e2e-reports/${REPORT_PATH}/ \
            --cache-control "max-age=86400"
          echo "REPORT_URL=http://couplesapp-e2e-reports.s3-website-us-east-1.amazonaws.com/${REPORT_PATH}/index.html" >> $GITHUB_ENV

      - name: Fail job if tests failed
        if: steps.run-tests.outcome == 'failure'
        run: exit 1
