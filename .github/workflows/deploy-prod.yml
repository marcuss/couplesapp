name: Deploy to Production

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch or commit SHA to deploy'
        required: true
        default: 'main'

jobs:
  deploy:
    name: Build & Deploy to Production (S3 + CloudFront)
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then npm ci; else npm install; fi

      - name: Build application (prod)
        env:
          VITE_SUPABASE_URL: ${{ secrets.PROD_VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.PROD_VITE_SUPABASE_ANON_KEY }}
        run: npx vite build

      - name: Configure AWS credentials (prod)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.PROD_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.PROD_AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Deploy to S3 (prod)
        run: |
          aws s3 sync dist/ s3://${{ secrets.PROD_S3_BUCKET }} \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "index.html"
          aws s3 cp dist/index.html s3://${{ secrets.PROD_S3_BUCKET }}/index.html \
            --cache-control "no-cache, no-store, must-revalidate"

      - name: Invalidate CloudFront cache (prod)
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.PROD_CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"

      - name: Summary
        run: |
          echo "### ✅ Deployed to Production" >> $GITHUB_STEP_SUMMARY
          echo "**URL:** https://couplesapp.nextasy.co" >> $GITHUB_STEP_SUMMARY
          echo "**S3:** s3://${{ secrets.PROD_S3_BUCKET }}" >> $GITHUB_STEP_SUMMARY
          echo "**CloudFront:** E9XLIIECN36RN" >> $GITHUB_STEP_SUMMARY
          echo "**Ref deployed:** ${{ github.event.inputs.ref }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** $(git rev-parse HEAD)" >> $GITHUB_STEP_SUMMARY
