name: E2E Tests (Manual)

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to run E2E tests on'
        required: true
        default: 'main'
      browsers:
        description: 'Browsers to test (all / chromium / firefox / webkit)'
        required: false
        default: 'chromium'

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: |
          if [ "${{ github.event.inputs.browsers }}" = "all" ]; then
            npx playwright install --with-deps
          else
            npx playwright install --with-deps ${{ github.event.inputs.browsers }}
          fi

      - name: Run Playwright tests
        run: |
          if [ "${{ github.event.inputs.browsers }}" = "all" ]; then
            npx playwright test
          else
            npx playwright test --project=${{ github.event.inputs.browsers }}
          fi
        env:
          BASE_URL: ${{ secrets.BASE_URL || 'http://localhost:5173' }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ github.event.inputs.branch }}-${{ github.event.inputs.browsers }}
          path: playwright-report/
          retention-days: 7
